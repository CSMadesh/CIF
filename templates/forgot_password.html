{% extends 'base.html' %}
{% block title %}Forgot Password – IXOVA{% endblock %}
{% block content %}

<div class="auth3d-page">
  <div class="ai-grid"></div>
  <div class="ai-orb ai-orb-1"></div>
  <div class="ai-orb ai-orb-2"></div>

  <div class="auth3d-scene">
    <div class="auth3d-card">
      <div class="auth3d-topbar"></div>
      <div class="auth3d-logo">IXOVA</div>
      <p class="auth3d-subtitle">Reset your password — we'll send you an OTP</p>
      <div class="auth3d-ornament"><span></span><span class="diamond">◆</span><span></span></div>

      {% if messages %}
        {% for msg in messages %}
          <div class="auth3d-alert {% if msg.tags == 'success' %}auth3d-alert-success{% endif %}">{{ msg }}</div>
        {% endfor %}
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="auth3d-group">
          <label class="auth3d-label">Email Address</label>
          <div class="auth3d-input-wrap">
            <span class="auth3d-icon">📧</span>
            <input type="email" name="email" class="auth3d-input" placeholder="your@email.com" required autofocus>
          </div>
        </div>
        <button type="submit" class="auth3d-btn">
          <span>Send OTP</span>
          <span class="auth3d-btn-shine"></span>
        </button>
      </form>

      <div class="auth3d-footer">
        Remember your password? <a href="{% url 'login' %}">Sign in</a>
      </div>
    </div>
  </div>
</div>

{% endblock %}
