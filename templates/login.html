{% extends 'base.html' %}
{% block title %}Sign In – IXOVA{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card fade-up">
    <div class="auth-logo">IXOVA</div>
    <p class="auth-subtitle">Welcome back — sign in to continue</p>

    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-error">{{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:12px">Sign In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{% url 'register' %}">Create one</a>
    </div>
  </div>
</div>
{% endblock %}
