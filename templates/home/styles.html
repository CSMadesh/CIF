<!-- home/styles.html -->
<style>
.hw{min-height:100vh;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden;perspective:1200px;}
#bgCanvas{position:fixed;inset:0;pointer-events:none;z-index:0;width:100%;height:100%;}

/* Orbs */
.hw-orb{position:absolute;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:1;}
.hw-orb-1{width:700px;height:700px;background:radial-gradient(circle,rgba(255,255,255,0.05) 0%,transparent 70%);top:-200px;left:-200px;animation:hwOrb1 16s ease-in-out infinite;}
.hw-orb-2{width:500px;height:500px;background:radial-gradient(circle,rgba(255,255,255,0.04) 0%,transparent 70%);bottom:-120px;right:-120px;animation:hwOrb2 20s ease-in-out infinite;}
.hw-orb-3{width:400px;height:400px;background:radial-gradient(circle,rgba(255,255,255,0.03) 0%,transparent 70%);top:35%;left:60%;animation:hwOrb3 12s ease-in-out infinite;}
.hw-orb-4{width:300px;height:300px;background:radial-gradient(circle,rgba(255,255,255,0.025) 0%,transparent 70%);top:60%;left:10%;animation:hwOrb1 14s ease-in-out infinite reverse;}
@keyframes hwOrb1{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(50px,-40px) scale(1.08);}66%{transform:translate(-30px,50px) scale(0.92);}}
@keyframes hwOrb2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-60px,-30px) scale(1.1);}}
@keyframes hwOrb3{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(30px,40px) scale(0.9);}}

/* Grid */
.hw-grid{position:absolute;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 20%,transparent 75%);}

/* Nav */
.hw-nav{display:flex;align-items:center;justify-content:space-between;padding:20px 60px;position:relative;z-index:10;background:rgba(0,0,0,0.7);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,0.07);animation:hwSlideDown 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards;}
@keyframes hwSlideDown{from{opacity:0;transform:translateY(-24px);}to{opacity:1;transform:translateY(0);}}
.hw-logo{display:flex;align-items:center;font-size:24px;font-weight:800;letter-spacing:4px;position:relative;}
.hw-logo-ix{color:#fff;}.hw-logo-ova{color:rgba(255,255,255,0.35);}
.hw-logo-line{position:absolute;bottom:-6px;left:0;width:0;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.6),transparent);animation:hwLogoLine 1s ease 0.8s forwards;}
@keyframes hwLogoLine{to{width:100%;}}
.hw-nav-links{display:flex;gap:10px;}
.hw-btn{padding:9px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.3s ease;letter-spacing:0.3px;position:relative;overflow:hidden;}
.hw-btn-ghost{background:transparent;color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.1);}
.hw-btn-ghost:hover{border-color:rgba(255,255,255,0.35);color:#fff;background:rgba(255,255,255,0.04);box-shadow:inset 0 0 20px rgba(255,255,255,0.03);}
.hw-btn-solid{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.18);backdrop-filter:blur(12px);}
.hw-btn-solid:hover{background:rgba(255,255,255,0.16);border-color:rgba(255,255,255,0.45);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.5),0 0 20px rgba(255,255,255,0.06),inset 0 1px 0 rgba(255,255,255,0.2);}
.hw-btn-glow{position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(255,255,255,0.15),transparent 70%);opacity:0;transition:opacity 0.3s;}
.hw-btn-solid:hover .hw-btn-glow{opacity:1;}

/* Hero */
.hw-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px 40px;position:relative;z-index:5;}
.hw-badge{display:inline-flex;align-items:center;gap:10px;padding:8px 22px;border-radius:30px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.65);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;opacity:0;animation:hwFadeUp 0.8s ease 0.2s forwards;backdrop-filter:blur(12px);position:relative;transition:all 0.3s ease;}
.hw-badge:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.25);color:#fff;box-shadow:0 0 30px rgba(255,255,255,0.06),inset 0 1px 0 rgba(255,255,255,0.1);}
.hw-badge-dot{width:6px;height:6px;border-radius:50%;background:#fff;opacity:0.8;animation:hwDotPulse 2s ease-in-out infinite;flex-shrink:0;}
@keyframes hwDotPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,0.5);}50%{box-shadow:0 0 0 8px rgba(255,255,255,0);}}
.hw-badge-ring{position:absolute;inset:-4px;border-radius:34px;border:1px solid rgba(255,255,255,0.06);animation:hwRingPulse 3s ease-in-out infinite;}
@keyframes hwRingPulse{0%,100%{opacity:0.4;transform:scale(1);}50%{opacity:0.8;transform:scale(1.02);}}
.hw-title{font-size:clamp(44px,7vw,88px);font-weight:800;line-height:1.05;margin-bottom:24px;display:flex;gap:16px;flex-wrap:wrap;justify-content:center;letter-spacing:-2px;}
.hw-word{display:inline-block;color:#fff;opacity:0;animation:hwWordDrop 0.8s cubic-bezier(0.34,1.56,0.64,1) var(--d) forwards;text-shadow:0 4px 40px rgba(255,255,255,0.08);}
.hw-word-glow{background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,0.55) 50%,#fff 100%);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:hwWordDrop 0.8s cubic-bezier(0.34,1.56,0.64,1) var(--d) forwards,hwGlassShimmer 4s ease-in-out 1.2s infinite;filter:drop-shadow(0 0 40px rgba(255,255,255,0.25));}
@keyframes hwWordDrop{from{opacity:0;transform:translateY(-50px) rotateX(90deg) scale(0.8);}to{opacity:1;transform:translateY(0) rotateX(0deg) scale(1);}}
@keyframes hwGlassShimmer{0%,100%{background-position:0% 50%;filter:drop-shadow(0 0 20px rgba(255,255,255,0.15));}50%{background-position:100% 50%;filter:drop-shadow(0 0 50px rgba(255,255,255,0.35));}}
.hw-desc{font-size:17px;color:rgba(255,255,255,0.45);max-width:560px;line-height:1.8;margin-bottom:4px;min-height:56px;}
.hw-cursor{color:rgba(255,255,255,0.5);font-size:18px;animation:hwBlink 1s step-end infinite;display:inline-block;margin-bottom:32px;}
@keyframes hwBlink{0%,100%{opacity:1;}50%{opacity:0;}}

/* CTA */
.hw-cta{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:48px;opacity:0;animation:hwFadeUp 0.7s ease 1.8s forwards;}
.hw-cta-primary{display:inline-flex;align-items:center;gap:10px;padding:15px 36px;border-radius:12px;background:rgba(255,255,255,0.08);color:#fff;font-size:15px;font-weight:700;border:1px solid rgba(255,255,255,0.2);backdrop-filter:blur(20px);position:relative;overflow:hidden;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 8px 32px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.12);}
.hw-cta-primary:hover{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.5);transform:translateY(-5px) scale(1.02);box-shadow:0 20px 60px rgba(0,0,0,0.7),0 0 40px rgba(255,255,255,0.08),inset 0 1px 0 rgba(255,255,255,0.25);}
.hw-cta-border{position:absolute;inset:0;border-radius:12px;border:1px solid transparent;background:linear-gradient(135deg,rgba(255,255,255,0.3),transparent,rgba(255,255,255,0.1)) border-box;-webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);-webkit-mask-composite:destination-out;mask-composite:exclude;opacity:0;transition:opacity 0.3s;}
.hw-cta-primary:hover .hw-cta-border{opacity:1;}
.hw-arrow{font-size:18px;transition:transform 0.3s ease;display:inline-block;}
.hw-cta-primary:hover .hw-arrow{transform:translateX(6px);}
.hw-shine{position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);transition:left 0.6s ease;}
.hw-cta-primary:hover .hw-shine{left:100%;}
.hw-cta-ghost{display:inline-flex;align-items:center;gap:8px;padding:15px 36px;border-radius:12px;background:transparent;color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.1);font-size:15px;font-weight:600;position:relative;overflow:hidden;transition:all 0.3s ease;}
.hw-cta-ghost:hover{border-color:rgba(255,255,255,0.3);color:#fff;background:rgba(255,255,255,0.04);transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.08);}
.hw-ghost-shine{position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);transition:left 0.5s ease;}
.hw-cta-ghost:hover .hw-ghost-shine{left:100%;}

/* Stats */
.hw-stats{display:flex;align-items:center;gap:32px;padding:20px 40px;border-radius:20px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(24px);box-shadow:0 8px 40px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.08);opacity:0;animation:hwFadeUp 0.7s ease 2.1s forwards;transition:all 0.3s ease;}
.hw-stats:hover{border-color:rgba(255,255,255,0.15);box-shadow:0 12px 50px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.12);}
.hw-stat{text-align:center;}
.hw-stat-num{font-size:28px;font-weight:800;color:#fff;display:inline;}
.hw-stat-plus{color:rgba(255,255,255,0.35);font-size:20px;font-weight:700;}
.hw-stat-lbl{display:block;font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px;}
.hw-stat-sep{width:1px;height:40px;background:linear-gradient(180deg,transparent,rgba(255,255,255,0.15),transparent);}

/* ═══════════════════════════════════════
   AI HOLOGRAM SECTION
   ═══════════════════════════════════════ */
.hw-ai-section{position:relative;z-index:5;padding:80px 40px 60px;overflow:hidden;background:linear-gradient(180deg,rgba(0,0,0,0) 0%,rgba(255,255,255,0.015) 50%,rgba(0,0,0,0) 100%);}
.hw-ai-title{display:flex;align-items:center;gap:20px;justify-content:center;margin-bottom:48px;position:relative;z-index:2;}
.hw-ai-title-line{flex:1;max-width:200px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);}
.hw-ai-title-text{font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.35);}

/* Hologram stage */
.hw-holo-stage{position:relative;width:100%;max-width:520px;margin:0 auto 56px;z-index:2;}
#holoCanvas{display:block;width:100%;height:360px;border-radius:24px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08);box-shadow:0 8px 40px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.06);}
.hw-holo-label{margin-top:14px;text-align:center;font-size:12px;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,0.35);font-family:monospace;animation:hwBlink 2s step-end infinite;}

/* AI cards */
.hw-ai-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:900px;margin:0 auto;position:relative;z-index:2;}
.hw-ai-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:28px;display:flex;gap:18px;align-items:flex-start;backdrop-filter:blur(20px);box-shadow:0 8px 40px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.08);position:relative;overflow:hidden;cursor:default;opacity:0;transform:translateY(40px) rotateX(20deg) scale(0.95);transition:opacity 0.7s ease,transform 0.7s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.4s ease,border-color 0.4s ease;}
.hw-ai-card.hw-revealed{opacity:1;transform:translateY(0) rotateX(0deg) scale(1);}
.hw-aic-1{transition-delay:0s;}.hw-aic-2{transition-delay:0.15s;}.hw-aic-3{transition-delay:0.3s;}.hw-aic-4{transition-delay:0.45s;}
.hw-ai-card:hover{border-color:rgba(255,255,255,0.25);transform:translateY(-8px) rotateX(4deg) rotateY(-2deg) scale(1.02);box-shadow:0 24px 60px rgba(0,0,0,0.7),0 0 40px rgba(255,255,255,0.05),inset 0 1px 0 rgba(255,255,255,0.18);}
.hw-aic-glow{position:absolute;inset:0;background:radial-gradient(circle at 30% 0%,rgba(255,255,255,0.07),transparent 60%);opacity:0;transition:opacity 0.4s;}
.hw-ai-card:hover .hw-aic-glow{opacity:1;}
.hw-aic-icon{width:52px;height:52px;border-radius:16px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);box-shadow:inset 0 1px 0 rgba(255,255,255,0.15);}
.hw-ai-card:hover .hw-aic-icon{transform:scale(1.15) rotate(8deg) translateY(-4px);background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.3);box-shadow:0 8px 24px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.25);}
.hw-aic-body{flex:1;}
.hw-aic-body strong{display:block;font-size:15px;font-weight:700;color:#fff;margin-bottom:8px;}
.hw-aic-body p{font-size:13px;color:rgba(255,255,255,0.4);line-height:1.7;margin:0;transition:color 0.3s;}
.hw-ai-card:hover .hw-aic-body p{color:rgba(255,255,255,0.65);}

/* Features */
.hw-features{display:flex;justify-content:center;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.6);backdrop-filter:blur(24px);position:relative;z-index:5;}
.hw-feat{display:flex;align-items:center;gap:16px;padding:28px 36px;border-right:1px solid rgba(255,255,255,0.05);transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);opacity:0;animation:hwFadeUp 0.6s ease forwards;position:relative;overflow:hidden;cursor:default;}
.hw-feat:last-child{border-right:none;}
.hw-feat-1{animation-delay:2.4s;}.hw-feat-2{animation-delay:2.6s;}.hw-feat-3{animation-delay:2.8s;}.hw-feat-4{animation-delay:3.0s;}
.hw-feat:hover{background:rgba(255,255,255,0.04);transform:translateY(-6px) scale(1.02);box-shadow:0 20px 50px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.08);}
.hw-feat-glow{position:absolute;inset:0;background:radial-gradient(circle at 50% 100%,rgba(255,255,255,0.06),transparent 70%);opacity:0;transition:opacity 0.4s;}
.hw-feat:hover .hw-feat-glow{opacity:1;}
.hw-feat-icon{width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);backdrop-filter:blur(10px);box-shadow:inset 0 1px 0 rgba(255,255,255,0.12);}
.hw-feat:hover .hw-feat-icon{transform:scale(1.2) rotate(8deg) translateY(-4px);background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.25);box-shadow:0 8px 24px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.2);}
.hw-feat-body{display:flex;flex-direction:column;gap:4px;}
.hw-feat-body strong{color:#fff;font-size:14px;font-weight:700;}
.hw-feat-body span{color:rgba(255,255,255,0.35);font-size:12px;transition:color 0.3s;}
.hw-feat:hover .hw-feat-body span{color:rgba(255,255,255,0.6);}

@keyframes hwFadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

/* Responsive */
@media(max-width:900px){.hw-ai-cards{grid-template-columns:1fr;}}
@media(max-width:768px){
  .hw-nav{padding:0 16px;height:56px;}
  .hw-hero{padding:40px 20px 24px;}
  .hw-title{font-size:clamp(32px,9vw,52px);gap:10px;letter-spacing:-1px;}
  .hw-desc{font-size:15px;}
  .hw-stats{gap:16px;padding:14px 16px;flex-wrap:wrap;justify-content:center;}
  .hw-stat-sep{display:none;}
  .hw-ai-section{padding:50px 20px 40px;}
  .hw-ai-cards{grid-template-columns:1fr;gap:14px;}
  .hw-ai-card{padding:20px;}
  .hw-features{flex-direction:column;}
  .hw-feat{border-right:none;border-bottom:1px solid rgba(255,255,255,0.05);padding:18px 20px;}
  .hw-cta{gap:10px;}
  .hw-cta-primary,.hw-cta-ghost{padding:13px 24px;font-size:14px;}
}
@media(max-width:480px){
  .hw-title{font-size:clamp(28px,10vw,42px);gap:8px;}
  .hw-stats{gap:12px;padding:12px;}
  .hw-cta{flex-direction:column;align-items:center;}
  .hw-cta-primary,.hw-cta-ghost{width:100%;max-width:280px;justify-content:center;}
}
</style>
