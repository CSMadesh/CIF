<script>
(function(){
  const canvas = document.getElementById('holoCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, t = 0, revealed = false;

  function resize(){
    W = canvas.width  = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const CX = () => W / 2;
  const CY = () => H / 2;

  /* ── 3D sphere nodes ── */
  const NODES = [];
  const NODE_COUNT = 80;
  for(let i = 0; i < NODE_COUNT; i++){
    const phi   = Math.acos(1 - 2*(i+0.5)/NODE_COUNT);
    const theta = Math.PI * (1 + Math.sqrt(5)) * i;
    NODES.push({
      ox: Math.sin(phi)*Math.cos(theta),
      oy: Math.sin(phi)*Math.sin(theta),
      oz: Math.cos(phi),
      pulse: Math.random()*Math.PI*2,
      pulseV: 0.02 + Math.random()*0.02,
      size: 1.5 + Math.random()*2,
    });
  }

  /* ── orbiting rings ── */
  const RINGS = [
    { tilt:0.3,  speed:0.008, radius:1.4, phase:0    },
    { tilt:-0.5, speed:-0.006,radius:1.7, phase:1.2  },
    { tilt:1.1,  speed:0.005, radius:2.0, phase:2.4  },
  ];

  /* ── data packets flying along ring ── */
  const PACKETS = RINGS.map(r => ({
    angle: Math.random()*Math.PI*2,
    speed: r.speed * 3,
    ring: r,
  }));

  /* ── synaptic connections ── */
  const CONNECTIONS = [];
  for(let i = 0; i < 40; i++){
    const a = Math.floor(Math.random()*NODE_COUNT);
    const b = Math.floor(Math.random()*NODE_COUNT);
    if(a !== b) CONNECTIONS.push({a, b, pulse:Math.random()*Math.PI*2, pulseV:0.03+Math.random()*0.02});
  }

  /* ── floating data labels ── */
  const LABELS = ['LEARN','EARN','GROW','AI','DATA','SKILL','CAREER','CODE'];
  const floatLabels = LABELS.map((txt, i) => ({
    txt,
    angle: (i/LABELS.length)*Math.PI*2,
    radius: 0.55 + Math.random()*0.15,
    vy: -0.0003 - Math.random()*0.0002,
    phase: Math.random()*Math.PI*2,
  }));

  /* ── project 3D → 2D ── */
  function project(x, y, z, rotY, rotX, scale){
    /* rotY */
    const x1 = x*Math.cos(rotY) - z*Math.sin(rotY);
    const z1 = x*Math.sin(rotY) + z*Math.cos(rotY);
    /* rotX */
    const y2 = y*Math.cos(rotX) - z1*Math.sin(rotX);
    const z2 = y*Math.sin(rotX) + z1*Math.cos(rotX);
    const fov = 3;
    const s = fov / (fov + z2);
    return {
      sx: CX() + x1 * scale * s,
      sy: CY() + y2 * scale * s,
      depth: z2,
      s,
    };
  }

  /* ── draw sphere ── */
  function drawSphere(rotY, rotX, scale){
    /* sort by depth */
    const projected = NODES.map((n,i) => {
      const p = project(n.ox, n.oy, n.oz, rotY, rotX, scale);
      return {...p, node:n, idx:i};
    }).sort((a,b) => a.depth - b.depth);

    /* connections */
    CONNECTIONS.forEach(c => {
      c.pulse += c.pulseV;
      const pa = project(NODES[c.a].ox, NODES[c.a].oy, NODES[c.a].oz, rotY, rotX, scale);
      const pb = project(NODES[c.b].ox, NODES[c.b].oy, NODES[c.b].oz, rotY, rotX, scale);
      const depthAlpha = Math.max(0, (pa.depth + pb.depth)*0.5 + 1) / 2;
      const pulseAlpha = 0.04 + 0.06*Math.abs(Math.sin(c.pulse));
      ctx.beginPath();
      ctx.moveTo(pa.sx, pa.sy);
      ctx.lineTo(pb.sx, pb.sy);
      ctx.strokeStyle = `rgba(255,255,255,${pulseAlpha * depthAlpha})`;
      ctx.lineWidth = 0.6;
      ctx.stroke();
    });

    /* nodes */
    projected.forEach(p => {
      p.node.pulse += p.node.pulseV;
      const depthAlpha = Math.max(0, (p.depth + 1) / 2);
      const glow = 0.5 + 0.5*Math.sin(p.node.pulse);
      const r = p.node.size * p.s * (0.8 + 0.4*glow);
      const a = (0.3 + 0.5*glow) * depthAlpha;

      /* glow halo */
      const g = ctx.createRadialGradient(p.sx, p.sy, 0, p.sx, p.sy, r*5);
      g.addColorStop(0, `rgba(255,255,255,${a*0.3})`);
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath(); ctx.arc(p.sx, p.sy, r*5, 0, Math.PI*2);
      ctx.fillStyle = g; ctx.fill();

      /* core dot */
      ctx.beginPath(); ctx.arc(p.sx, p.sy, r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${a})`; ctx.fill();
    });
  }

  /* ── draw orbiting rings ── */
  function drawRings(rotY, rotX, scale){
    RINGS.forEach((ring, ri) => {
      ring.phase += ring.speed;
      const steps = 120;
      ctx.beginPath();
      for(let i = 0; i <= steps; i++){
        const a = (i/steps)*Math.PI*2;
        const rx = Math.cos(a)*ring.radius;
        const ry = Math.sin(a)*Math.cos(ring.tilt)*ring.radius;
        const rz = Math.sin(a)*Math.sin(ring.tilt)*ring.radius;
        const p = project(rx, ry, rz, rotY + ring.phase, rotX, scale);
        const depthA = Math.max(0,(p.depth+2)/4)*0.25;
        if(i===0) ctx.moveTo(p.sx, p.sy);
        else {
          ctx.strokeStyle = `rgba(255,255,255,${depthA})`;
          ctx.lineWidth = 1;
          ctx.lineTo(p.sx, p.sy);
          ctx.stroke();
          ctx.beginPath(); ctx.moveTo(p.sx, p.sy);
        }
      }

      /* data packet on ring */
      const pk = PACKETS[ri];
      pk.angle += pk.speed;
      const pa = pk.angle;
      const px = Math.cos(pa)*ring.radius;
      const py = Math.sin(pa)*Math.cos(ring.tilt)*ring.radius;
      const pz = Math.sin(pa)*Math.sin(ring.tilt)*ring.radius;
      const pp = project(px, py, pz, rotY + ring.phase, rotX, scale);
      const pg = ctx.createRadialGradient(pp.sx, pp.sy, 0, pp.sx, pp.sy, 8);
      pg.addColorStop(0, 'rgba(255,255,255,0.8)');
      pg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath(); ctx.arc(pp.sx, pp.sy, 8, 0, Math.PI*2);
      ctx.fillStyle = pg; ctx.fill();
      ctx.beginPath(); ctx.arc(pp.sx, pp.sy, 3, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.fill();
    });
  }

  /* ── draw floating labels ── */
  function drawLabels(rotY, scale){
    floatLabels.forEach(lbl => {
      lbl.phase += 0.008;
      const x = Math.cos(lbl.angle + rotY*0.3)*lbl.radius*scale + CX();
      const y = Math.sin(lbl.phase)*20 + CY() + Math.sin(lbl.angle)*lbl.radius*scale*0.3;
      const a = 0.15 + 0.15*Math.sin(lbl.phase);
      ctx.save();
      ctx.globalAlpha = a;
      ctx.font = '700 10px monospace';
      ctx.letterSpacing = '2px';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.fillText(lbl.txt, x, y);
      ctx.restore();
    });
  }

  /* ── draw scan line ── */
  let scanY = 0, scanDir = 1;
  function drawScan(){
    scanY += 1.2 * scanDir;
    if(scanY > H*0.7 || scanY < H*0.3) scanDir *= -1;
    const g = ctx.createLinearGradient(0, scanY-20, 0, scanY+20);
    g.addColorStop(0, 'rgba(255,255,255,0)');
    g.addColorStop(0.5, 'rgba(255,255,255,0.04)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, scanY-20, W, 40);
  }

  /* ── draw hologram base glow ── */
  function drawBase(scale){
    const cx = CX(), cy = CY();
    /* outer glow ring */
    const g = ctx.createRadialGradient(cx, cy, scale*0.8, cx, cy, scale*2.2);
    g.addColorStop(0, 'rgba(255,255,255,0.03)');
    g.addColorStop(0.5, 'rgba(255,255,255,0.015)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(cx, cy, scale*2.2, 0, Math.PI*2);
    ctx.fillStyle = g; ctx.fill();

    /* bottom projection cone */
    const cg = ctx.createLinearGradient(cx, cy+scale, cx, cy+scale*2.5);
    cg.addColorStop(0, 'rgba(255,255,255,0.06)');
    cg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.moveTo(cx-scale*0.3, cy+scale);
    ctx.lineTo(cx-scale*0.8, cy+scale*2.5);
    ctx.lineTo(cx+scale*0.8, cy+scale*2.5);
    ctx.lineTo(cx+scale*0.3, cy+scale);
    ctx.closePath();
    ctx.fillStyle = cg; ctx.fill();

    /* base ellipse */
    ctx.beginPath();
    ctx.ellipse(cx, cy+scale*2.5, scale*0.8, scale*0.15, 0, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  /* ── main loop ── */
  function loop(now){
    t = now * 0.001;
    ctx.clearRect(0, 0, W, H);

    /* bg grid */
    ctx.strokeStyle = 'rgba(255,255,255,0.025)';
    ctx.lineWidth = 0.5;
    for(let x=0;x<W;x+=24){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for(let y=0;y<H;y+=24){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    const rotY  = t * 0.4;
    const rotX  = Math.sin(t*0.2)*0.3;
    const scale = Math.min(W, H) * 0.28;

    drawScan();
    drawBase(scale);
    drawSphere(rotY, rotX, scale);
    drawRings(rotY, rotX, scale);
    drawLabels(rotY, scale);

    /* reveal cards after 3s */
    if(t > 3 && !revealed){
      revealed = true;
      const lbl = document.getElementById('holoLabel');
      if(lbl) lbl.textContent = 'AI Neural Network Active ✓';
      document.querySelectorAll('.hw-ai-card').forEach((card, i) => {
        setTimeout(() => card.classList.add('hw-revealed'), i * 150);
      });
    }

    requestAnimationFrame(loop);
  }

  /* start on scroll into view */
  const section = document.getElementById('hwAiSection');
  if(!section){ requestAnimationFrame(loop); return; }
  const obs = new IntersectionObserver(entries => {
    if(entries[0].isIntersecting){ obs.disconnect(); requestAnimationFrame(loop); }
  }, {threshold: 0.2});
  obs.observe(section);
})();
</script>
