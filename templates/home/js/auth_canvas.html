<script>
(function(){
  const canvas = document.getElementById('authCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  /* Silver rings */
  const rings = Array.from({length:5}, () => ({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    r: 30 + Math.random()*70,
    vx: (Math.random()-0.5)*0.15,
    vy: (Math.random()-0.5)*0.15,
    a: 0.04 + Math.random()*0.06,
    p: Math.random()*Math.PI*2,
    pv: 0.007,
  }));

  /* Constellation dots */
  const dots = Array.from({length:70}, () => ({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    vx: (Math.random()-0.5)*0.12,
    vy: (Math.random()-0.5)*0.12,
    r: 0.6 + Math.random()*1.2,
    a: 0.1 + Math.random()*0.3,
    p: Math.random()*Math.PI*2,
    pv: 0.01 + Math.random()*0.015,
  }));

  const CDIST = 110;

  function loop(){
    ctx.clearRect(0,0,W,H);

    /* bg */
    const bg = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.85);
    bg.addColorStop(0,'rgba(10,10,14,1)'); bg.addColorStop(1,'rgba(0,0,0,1)');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    /* rings */
    rings.forEach(ring=>{
      ring.x+=ring.vx; ring.y+=ring.vy; ring.p+=ring.pv;
      if(ring.x<-ring.r)ring.x=W+ring.r; if(ring.x>W+ring.r)ring.x=-ring.r;
      if(ring.y<-ring.r)ring.y=H+ring.r; if(ring.y>H+ring.r)ring.y=-ring.r;
      const a=ring.a*(0.5+0.5*Math.sin(ring.p));
      ctx.beginPath(); ctx.arc(ring.x,ring.y,ring.r,0,Math.PI*2);
      ctx.strokeStyle=`rgba(200,205,220,${a})`; ctx.lineWidth=0.8; ctx.stroke();
      ctx.beginPath(); ctx.arc(ring.x,ring.y,ring.r*0.55,0,Math.PI*2);
      ctx.strokeStyle=`rgba(200,205,220,${a*0.35})`; ctx.lineWidth=0.4; ctx.stroke();
    });

    /* constellation lines */
    for(let i=0;i<dots.length;i++){
      for(let j=i+1;j<dots.length;j++){
        const dx=dots[i].x-dots[j].x, dy=dots[i].y-dots[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<CDIST){
          const a=(1-d/CDIST)*0.07;
          ctx.beginPath(); ctx.moveTo(dots[i].x,dots[i].y); ctx.lineTo(dots[j].x,dots[j].y);
          ctx.strokeStyle=`rgba(200,210,230,${a})`; ctx.lineWidth=0.4; ctx.stroke();
        }
      }
    }

    /* dots */
    dots.forEach(d=>{
      d.x+=d.vx; d.y+=d.vy; d.p+=d.pv;
      if(d.x<0)d.x=W; if(d.x>W)d.x=0;
      if(d.y<0)d.y=H; if(d.y>H)d.y=0;
      const a=d.a*(0.5+0.5*Math.sin(d.p));
      ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(220,225,240,${a})`; ctx.fill();
    });

    /* vignette */
    const vg=ctx.createRadialGradient(W/2,H/2,H*0.1,W/2,H/2,H*0.9);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.6)');
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
