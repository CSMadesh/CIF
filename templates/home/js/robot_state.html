<script>
window.RX = {};

/* ── easing ── */
RX.easeOut   = t => 1 - Math.pow(1 - Math.min(t,1), 3);
RX.easeInOut = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
RX.lerp      = (a,b,t) => a + (b-a)*t;

/* ── canvas refs (set by main) ── */
RX.canvas = null;
RX.ctx    = null;
RX.W      = 0;
RX.H      = 0;
RX.CX     = () => RX.W / 2;
RX.CY     = () => RX.H / 2 - 10;

/* ── phase ── */
/* phases: assemble → dismantle → transform → fly → done */
RX.phase      = 'assemble';
RX.phaseStart = 0;
RX.elapsed    = 0;
RX.revealed   = false;

/* ── robot part timers (0..1) ── */
RX.parts = {
  torso:  { t:0, delay:200  },
  head:   { t:0, delay:600  },
  lArm:   { t:0, delay:900  },
  rArm:   { t:0, delay:960  },
  lLeg:   { t:0, delay:1200 },
  rLeg:   { t:0, delay:1260 },
  antenna:{ t:0, delay:400  },
  eyes:   { t:0, delay:1500 },
  chest:  { t:0, delay:1800 },
};

/* ── dismantle offsets (each part flies away) ── */
RX.dismantleOffsets = {
  torso:  { x:0,   y:0,   r:0,   vx:0,   vy:-2,  vr:0.02  },
  head:   { x:0,   y:0,   r:0,   vx:-1,  vy:-4,  vr:-0.05 },
  lArm:   { x:0,   y:0,   r:0,   vx:-5,  vy:-1,  vr:-0.08 },
  rArm:   { x:0,   y:0,   r:0,   vx:5,   vy:-1,  vr:0.08  },
  lLeg:   { x:0,   y:0,   r:0,   vx:-2,  vy:4,   vr:-0.04 },
  rLeg:   { x:0,   y:0,   r:0,   vx:2,   vy:4,   vr:0.04  },
  antenna:{ x:0,   y:0,   r:0,   vx:0,   vy:-6,  vr:0.1   },
  eyes:   { x:0,   y:0,   r:0,   vx:0,   vy:-3,  vr:0.06  },
  chest:  { x:0,   y:0,   r:0,   vx:0,   vy:3,   vr:0.03  },
};

/* ── jet state ── */
RX.jet = {
  x: 0, y: 0,          /* position */
  scale: 0,            /* 0..1 grow in */
  angle: 0,            /* tilt */
  thrustFlicker: 0,
  trailPoints: [],
  flyT: 0,             /* 0..1 fly-across progress */
  alpha: 1,
};

/* ── ambient ── */
RX.eyeGlow   = 0;
RX.eyeDir    = 1;
RX.rotorAngle= 0;
RX.scanY     = 0;
RX.scanDir   = 1;
RX.floatY    = 0;

/* ── sparks ── */
RX.sparks = [];
RX.spawnSparks = function(x, y, n, spd){
  spd = spd || 4;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=Math.random()*spd+1;
    RX.sparks.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:1, decay:0.022+Math.random()*0.02, r:Math.random()*2+0.5 });
  }
};
RX.tickSparks = function(){
  for(let i=RX.sparks.length-1;i>=0;i--){
    const s=RX.sparks[i];
    s.x+=s.vx; s.y+=s.vy; s.vy+=0.14; s.vx*=0.96; s.life-=s.decay;
    if(s.life<=0) RX.sparks.splice(i,1);
  }
};
RX.drawSparks = function(){
  const ctx=RX.ctx;
  RX.sparks.forEach(s=>{
    const a=Math.max(0,s.life);
    ctx.save(); ctx.globalAlpha=a;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(s.x-s.vx*3,s.y-s.vy*3);
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=0.8; ctx.stroke();
    ctx.restore();
  });
};

/* ── circuits ── */
RX.circuits = [];
RX.addCircuit = function(x,y,dir,len){
  RX.circuits.push({ x,y,dir,len,drawn:0,spd:2.5,alpha:0.35+Math.random()*0.3 });
};
RX.tickCircuits = function(){
  RX.circuits.forEach(c=>{ if(c.drawn<c.len) c.drawn=Math.min(c.drawn+c.spd,c.len); });
};
RX.drawCircuits = function(){
  const ctx=RX.ctx;
  RX.circuits.forEach(c=>{
    if(c.drawn<=0) return;
    const ex=c.x+(c.dir==='r'?c.drawn:c.dir==='l'?-c.drawn:0);
    const ey=c.y+(c.dir==='d'?c.drawn:c.dir==='u'?-c.drawn:0);
    ctx.beginPath(); ctx.moveTo(c.x,c.y); ctx.lineTo(ex,ey);
    ctx.strokeStyle=`rgba(255,255,255,${c.alpha})`; ctx.lineWidth=1; ctx.stroke();
    ctx.beginPath(); ctx.arc(ex,ey,2,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${c.alpha})`; ctx.fill();
  });
};

/* ── status bar ── */
RX.PHASES = [
  { label:'Initializing AI Core...',      pct:0  },
  { label:'Loading Neural Matrix...',     pct:18 },
  { label:'Assembling Robotic Frame...',  pct:36 },
  { label:'Calibrating Sensors...',       pct:55 },
  { label:'Dismantling Structure...',     pct:68 },
  { label:'Transforming to Jet Mode...', pct:80 },
  { label:'Launching into Orbit...',      pct:92 },
  { label:'AI Systems Online ✓',          pct:100},
];
RX.phaseIdx = 0;
RX.setStatus = function(pct){
  const el  = document.getElementById('robotStatusText');
  const bar = document.getElementById('robotProgressFill');
  const lbl = document.getElementById('robotProgressLabel');
  const idx = RX.PHASES.reduce((b,ph,i)=>ph.pct<=pct?i:b, 0);
  if(el && idx!==RX.phaseIdx){ RX.phaseIdx=idx; el.textContent=RX.PHASES[idx].label; }
  if(bar) bar.style.width=pct+'%';
  if(lbl) lbl.textContent=pct+'%';
};
</script>
