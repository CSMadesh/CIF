<script>
RX.drawRobot = function(alpha, offsets){
  const ctx=RX.ctx, p=RX.parts, fy=RX.floatY;
  const cx=RX.CX(), cy=RX.CY();
  alpha = alpha===undefined ? 1 : alpha;
  offsets = offsets || {};

  function getOff(key){ const o=offsets[key]||{}; return {x:o.x||0,y:o.y||0,r:o.r||0}; }

  /* TORSO */
  if(p.torso.t>0){
    const t=RX.easeOut(p.torso.t), tw=70*t, th=80*t;
    const off=getOff('torso');
    ctx.save(); ctx.globalAlpha=alpha*t;
    ctx.translate(cx+off.x, cy+10+fy+off.y); ctx.rotate(off.r);
    const g=ctx.createLinearGradient(-tw/2,-th/2,tw/2,th/2);
    g.addColorStop(0,'rgba(255,255,255,0.13)'); g.addColorStop(1,'rgba(255,255,255,0.06)');
    ctx.beginPath(); ctx.roundRect(-tw/2,-th/2,tw,th,8);
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(-tw/2+8,-th/2+20); ctx.lineTo(tw/2-8,-th/2+20); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-tw/2+8,-th/2+42); ctx.lineTo(tw/2-8,-th/2+42); ctx.stroke();
    if(p.chest.t>0){
      const ct=p.chest.t;
      const cg=ctx.createRadialGradient(0,0,0,0,0,18*ct);
      cg.addColorStop(0,`rgba(255,255,255,${0.35*ct})`); cg.addColorStop(1,'rgba(255,255,255,0)');
      ctx.beginPath(); ctx.arc(0,0,18*ct,0,Math.PI*2); ctx.fillStyle=cg; ctx.fill();
      ctx.beginPath(); ctx.arc(0,0,9*ct,0,Math.PI*2);
      ctx.strokeStyle=`rgba(255,255,255,${0.7*ct})`; ctx.lineWidth=1.5; ctx.stroke();
      ctx.save(); ctx.rotate(RX.rotorAngle);
      for(let i=0;i<4;i++){
        ctx.save(); ctx.rotate(i*Math.PI/2);
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-13*ct);
        ctx.strokeStyle=`rgba(255,255,255,${0.4*ct})`; ctx.lineWidth=1; ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    }
    ctx.restore();
  }

  /* HEAD */
  if(p.head.t>0){
    const t=RX.easeOut(p.head.t), hw=50*t, hh=44*t;
    const off=getOff('head');
    ctx.save(); ctx.globalAlpha=alpha*t;
    ctx.translate(cx+off.x, cy-70+fy+off.y); ctx.rotate(off.r);
    const g=ctx.createLinearGradient(-hw/2,-hh/2,hw/2,hh/2);
    g.addColorStop(0,'rgba(255,255,255,0.14)'); g.addColorStop(1,'rgba(255,255,255,0.07)');
    ctx.beginPath(); ctx.roundRect(-hw/2,-hh/2,hw,hh,10);
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.roundRect(-hw/2+6,-hh/2+8,hw-12,hh*0.45,4);
    ctx.fillStyle='rgba(255,255,255,0.05)'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=0.8; ctx.stroke();
    ctx.beginPath(); ctx.rect(-10,hh/2,20,10);
    ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1; ctx.stroke();
    ctx.restore();
  }

  /* EYES */
  if(p.eyes.t>0){
    const t=RX.easeOut(p.eyes.t), ea=0.15+RX.eyeGlow*0.5;
    const off=getOff('eyes');
    ctx.save(); ctx.globalAlpha=alpha*t;
    ctx.translate(cx+off.x, cy-70+fy+off.y); ctx.rotate(off.r);
    [-14,14].forEach(ex=>{
      const eg=ctx.createRadialGradient(ex,0,0,ex,0,9);
      eg.addColorStop(0,`rgba(255,255,255,${ea*1.5})`); eg.addColorStop(1,'rgba(255,255,255,0)');
      ctx.beginPath(); ctx.arc(ex,0,9,0,Math.PI*2); ctx.fillStyle=eg; ctx.fill();
      ctx.beginPath(); ctx.arc(ex,0,4,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${ea+0.3})`; ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=1; ctx.stroke();
    });
    if(p.chest.t>0.3){
      ctx.beginPath(); ctx.moveTo(-19,RX.scanY*0.3); ctx.lineTo(19,RX.scanY*0.3);
      ctx.strokeStyle=`rgba(255,255,255,${0.12+RX.eyeGlow*0.1})`; ctx.lineWidth=1; ctx.stroke();
    }
    ctx.restore();
  }

  /* ANTENNA */
  if(p.antenna.t>0){
    const t=RX.easeOut(p.antenna.t);
    const off=getOff('antenna');
    ctx.save(); ctx.globalAlpha=alpha*t;
    ctx.translate(cx+off.x, cy-70+fy+off.y); ctx.rotate(off.r);
    ctx.beginPath(); ctx.moveTo(0,-22); ctx.lineTo(0,-22-22*t);
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1.5; ctx.stroke();
    const ag=ctx.createRadialGradient(0,-22-22*t,0,0,-22-22*t,7);
    ag.addColorStop(0,`rgba(255,255,255,${0.4+RX.eyeGlow*0.4})`); ag.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(0,-22-22*t,7,0,Math.PI*2); ctx.fillStyle=ag; ctx.fill();
    ctx.beginPath(); ctx.arc(0,-22-22*t,3,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${0.6+RX.eyeGlow*0.3})`; ctx.fill();
    ctx.restore();
  }

  /* LEFT ARM */
  if(p.lArm.t>0){
    const t=RX.easeOut(p.lArm.t);
    const off=getOff('lArm');
    ctx.save(); ctx.globalAlpha=alpha*t;
    ctx.translate(cx-35-22*(1-t)+off.x, cy-20+fy+off.y); ctx.rotate(off.r);
    ctx.beginPath(); ctx.roundRect(-10,-5,20,45,5);
    ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=1.2; ctx.stroke();
    ctx.beginPath(); ctx.arc(0,40,8,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1; ctx.stroke();
    ctx.beginPath(); ctx.roundRect(-8,48,16,35,4);
    ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1; ctx.stroke();
    ctx.restore();
  }

  /* RIGHT ARM */
  if(p.rArm.t>0){
    const t=RX.easeOut(p.rArm.t);
    const off=getOff('rArm');
    ctx.save(); ctx.globalAlpha=alpha*t;
    ctx.translate(cx+35+22*(1-t)+off.x, cy-20+fy+off.y); ctx.rotate(off.r);
    ctx.beginPath(); ctx.roundRect(-10,-5,20,45,5);
    ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=1.2; ctx.stroke();
    ctx.beginPath(); ctx.arc(0,40,8,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1; ctx.stroke();
    ctx.beginPath(); ctx.roundRect(-8,48,16,35,4);
    ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1; ctx.stroke();
    ctx.restore();
  }

  /* LEFT LEG */
  if(p.lLeg.t>0){
    const t=RX.easeOut(p.lLeg.t);
    const off=getOff('lLeg');
    ctx.save(); ctx.globalAlpha=alpha*t;
    ctx.translate(cx-20+off.x, cy+50+22*(1-t)+fy+off.y); ctx.rotate(off.r);
    ctx.beginPath(); ctx.roundRect(-12,0,24,50,5);
    ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=1.2; ctx.stroke();
    ctx.beginPath(); ctx.roundRect(-14,50,28,18,4);
    ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1; ctx.stroke();
    ctx.restore();
  }

  /* RIGHT LEG */
  if(p.rLeg.t>0){
    const t=RX.easeOut(p.rLeg.t);
    const off=getOff('rLeg');
    ctx.save(); ctx.globalAlpha=alpha*t;
    ctx.translate(cx+20+off.x, cy+50+22*(1-t)+fy+off.y); ctx.rotate(off.r);
    ctx.beginPath(); ctx.roundRect(-12,0,24,50,5);
    ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=1.2; ctx.stroke();
    ctx.beginPath(); ctx.roundRect(-14,50,28,18,4);
    ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1; ctx.stroke();
    ctx.restore();
  }
};
</script>
