<script>
(function(){
  const canvas=document.getElementById('robotCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const statusText=document.getElementById('robotStatusText');
  const progressFill=document.getElementById('robotProgressFill');
  const progressLabel=document.getElementById('robotProgressLabel');

  let W,H;
  function resize(){W=canvas.width=canvas.offsetWidth;H=canvas.height=canvas.offsetHeight;}
  resize();
  window.addEventListener('resize',resize);

  /* ── Sparks ── */
  const sparks=[];
  function spawnSparks(x,y,n){
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2,s=Math.random()*4+1;
      sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.025+Math.random()*0.02,r:Math.random()*2+0.5});
    }
  }
  function tickSparks(){
    for(let i=sparks.length-1;i>=0;i--){
      const s=sparks[i];
      s.x+=s.vx;s.y+=s.vy;s.vy+=0.15;s.vx*=0.96;s.life-=s.decay;
      if(s.life<=0)sparks.splice(i,1);
    }
  }
  function drawSparks(){
    sparks.forEach(s=>{
      const a=Math.max(0,s.life);
      ctx.save();ctx.globalAlpha=a;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();
      ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*3,s.y-s.vy*3);
      ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=0.8;ctx.stroke();
      ctx.restore();
    });
  }

  /* ── Growing circuit lines ── */
  const circuits=[];
  function addCircuit(x,y,dir,len){
    circuits.push({x,y,dir,len,drawn:0,spd:2.5,alpha:0.4+Math.random()*0.3});
  }
  function tickCircuits(){circuits.forEach(c=>{if(c.drawn<c.len)c.drawn=Math.min(c.drawn+c.spd,c.len);});}
  function drawCircuits(){
    circuits.forEach(c=>{
      if(c.drawn<=0)return;
      const ex=c.x+(c.dir==='r'?c.drawn:c.dir==='l'?-c.drawn:0);
      const ey=c.y+(c.dir==='d'?c.drawn:c.dir==='u'?-c.drawn:0);
      ctx.beginPath();ctx.moveTo(c.x,c.y);ctx.lineTo(ex,ey);
      ctx.strokeStyle=`rgba(255,255,255,${c.alpha})`;ctx.lineWidth=1;ctx.stroke();
      ctx.beginPath();ctx.arc(ex,ey,2,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${c.alpha})`;ctx.fill();
    });
  }

  /* ── Status / progress ── */
  const PHASES=[
    {label:'Initializing AI Core...',     pct:0},
    {label:'Loading Neural Matrix...',    pct:18},
    {label:'Assembling Robotic Frame...', pct:38},
    {label:'Calibrating Sensors...',      pct:62},
    {label:'Running Diagnostics...',      pct:82},
    {label:'AI Transformation Complete ✓',pct:100},
  ];
  let phaseIdx=0;
  function setStatus(pct){
    const idx=PHASES.reduce((best,ph,i)=>ph.pct<=pct?i:best,0);
    if(statusText && idx!==phaseIdx){phaseIdx=idx;statusText.textContent=PHASES[idx].label;}
    if(progressFill)progressFill.style.width=pct+'%';
    if(progressLabel)progressLabel.textContent=pct+'%';
  }

  /* ── Parts ── */
  const parts={
    torso:  {t:0,delay:200},
    head:   {t:0,delay:600},
    lArm:   {t:0,delay:900},
    rArm:   {t:0,delay:950},
    lLeg:   {t:0,delay:1200},
    rLeg:   {t:0,delay:1250},
    antenna:{t:0,delay:400},
    eyes:   {t:0,delay:1500},
    chest:  {t:0,delay:1800},
  };

  function easeOut(t){return 1-Math.pow(1-Math.min(t,1),3);}

  let startTime=null;
  let revealed=false;
  let eyeGlow=0,eyeDir=1;
  let rotorAngle=0;
  let scanY=0,scanDir=1;
  let floatOffset=0;

  const CX=()=>W/2;
  const CY=()=>H/2-10;

  function drawRobot(elapsed){
    const cx=CX(),cy=CY();

    /* update parts */
    Object.keys(parts).forEach(k=>{
      const p=parts[k];
      if(elapsed>p.delay)p.t=Math.min(p.t+0.035,1);
    });

    /* progress */
    const pct=Math.min(100,Math.round((elapsed/3200)*100));
    setStatus(pct);

    /* sparks during assembly */
    if(elapsed>200&&elapsed<2500&&Math.random()<0.25)
      spawnSparks(cx+(-70+Math.random()*140),cy+(-90+Math.random()*180),3);

    /* circuits */
    if(elapsed>700&&circuits.length<28&&Math.random()<0.07){
      const dirs=['r','l','u','d'];
      addCircuit(cx+(-110+Math.random()*220),cy+(-110+Math.random()*220),
        dirs[Math.floor(Math.random()*4)],20+Math.random()*65);
    }
    tickCircuits();

    /* animate values */
    eyeGlow+=0.04*eyeDir; if(eyeGlow>1||eyeGlow<0)eyeDir*=-1;
    rotorAngle+=0.05;
    if(parts.eyes.t>0.5){scanY+=1.5*scanDir;if(Math.abs(scanY)>55)scanDir*=-1;}
    floatOffset=Math.sin(elapsed*0.001)*4;

    /* ── TORSO ── */
    if(parts.torso.t>0){
      const t=easeOut(parts.torso.t),tw=70*t,th=80*t;
      ctx.save();ctx.globalAlpha=t;ctx.translate(cx,cy+10+floatOffset);
      const g=ctx.createLinearGradient(-tw/2,-th/2,tw/2,th/2);
      g.addColorStop(0,'rgba(255,255,255,0.12)');g.addColorStop(0.5,'rgba(255,255,255,0.05)');g.addColorStop(1,'rgba(255,255,255,0.1)');
      ctx.beginPath();ctx.roundRect(-tw/2,-th/2,tw,th,8);ctx.fillStyle=g;ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1.5;ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(-tw/2+8,-th/2+20);ctx.lineTo(tw/2-8,-th/2+20);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-tw/2+8,-th/2+42);ctx.lineTo(tw/2-8,-th/2+42);ctx.stroke();
      /* chest reactor */
      if(parts.chest.t>0){
        const ct=parts.chest.t;
        const cg=ctx.createRadialGradient(0,0,0,0,0,18*ct);
        cg.addColorStop(0,`rgba(255,255,255,${0.35*ct})`);cg.addColorStop(1,'rgba(255,255,255,0)');
        ctx.beginPath();ctx.arc(0,0,18*ct,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
        ctx.beginPath();ctx.arc(0,0,9*ct,0,Math.PI*2);
        ctx.strokeStyle=`rgba(255,255,255,${0.7*ct})`;ctx.lineWidth=1.5;ctx.stroke();
        ctx.save();ctx.rotate(rotorAngle);
        for(let i=0;i<4;i++){
          ctx.save();ctx.rotate(i*Math.PI/2);
          ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-13*ct);
          ctx.strokeStyle=`rgba(255,255,255,${0.4*ct})`;ctx.lineWidth=1;ctx.stroke();
          ctx.restore();
        }
        ctx.restore();
      }
      ctx.restore();
    }

    /* ── HEAD ── */
    if(parts.head.t>0){
      const t=easeOut(parts.head.t),hw=50*t,hh=44*t;
      ctx.save();ctx.globalAlpha=t;ctx.translate(cx,cy-70+floatOffset);
      const g=ctx.createLinearGradient(-hw/2,-hh/2,hw/2,hh/2);
      g.addColorStop(0,'rgba(255,255,255,0.14)');g.addColorStop(1,'rgba(255,255,255,0.07)');
      ctx.beginPath();ctx.roundRect(-hw/2,-hh/2,hw,hh,10);ctx.fillStyle=g;ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.5;ctx.stroke();
      /* visor */
      ctx.beginPath();ctx.roundRect(-hw/2+6,-hh/2+8,hw-12,hh*0.45,4);
      ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=0.8;ctx.stroke();
      /* neck */
      ctx.beginPath();ctx.rect(-10,hh/2,20,10);
      ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.stroke();
      ctx.restore();
    }

    /* ── EYES ── */
    if(parts.eyes.t>0){
      const t=easeOut(parts.eyes.t),ea=0.15+eyeGlow*0.5;
      ctx.save();ctx.globalAlpha=t;ctx.translate(cx,cy-70+floatOffset);
      [-14,14].forEach(ex=>{
        const eg=ctx.createRadialGradient(ex,0,0,ex,0,9);
        eg.addColorStop(0,`rgba(255,255,255,${ea*1.5})`);eg.addColorStop(1,'rgba(255,255,255,0)');
        ctx.beginPath();ctx.arc(ex,0,9,0,Math.PI*2);ctx.fillStyle=eg;ctx.fill();
        ctx.beginPath();ctx.arc(ex,0,4,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${ea+0.3})`;ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=1;ctx.stroke();
      });
      if(parts.chest.t>0.3){
        ctx.beginPath();ctx.moveTo(-19,scanY*0.3);ctx.lineTo(19,scanY*0.3);
        ctx.strokeStyle=`rgba(255,255,255,${0.12+eyeGlow*0.1})`;ctx.lineWidth=1;ctx.stroke();
      }
      ctx.restore();
    }

    /* ── ANTENNA ── */
    if(parts.antenna.t>0){
      const t=easeOut(parts.antenna.t);
      ctx.save();ctx.globalAlpha=t;ctx.translate(cx,cy-70+floatOffset);
      ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(0,-22-22*t);
      ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.5;ctx.stroke();
      const ag=ctx.createRadialGradient(0,-22-22*t,0,0,-22-22*t,7);
      ag.addColorStop(0,`rgba(255,255,255,${0.4+eyeGlow*0.4})`);ag.addColorStop(1,'rgba(255,255,255,0)');
      ctx.beginPath();ctx.arc(0,-22-22*t,7,0,Math.PI*2);ctx.fillStyle=ag;ctx.fill();
      ctx.beginPath();ctx.arc(0,-22-22*t,3,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${0.6+eyeGlow*0.3})`;ctx.fill();
      ctx.restore();
    }

    /* ── LEFT ARM ── */
    if(parts.lArm.t>0){
      const t=easeOut(parts.lArm.t);
      ctx.save();ctx.globalAlpha=t;ctx.translate(cx-35-22*(1-t),cy-20+floatOffset);
      ctx.beginPath();ctx.roundRect(-10,-5,20,45,5);
      ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.2;ctx.stroke();
      ctx.beginPath();ctx.arc(0,40,8,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;ctx.stroke();
      ctx.beginPath();ctx.roundRect(-8,48,16,35,4);
      ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.stroke();
      ctx.restore();
    }

    /* ── RIGHT ARM ── */
    if(parts.rArm.t>0){
      const t=easeOut(parts.rArm.t);
      ctx.save();ctx.globalAlpha=t;ctx.translate(cx+35+22*(1-t),cy-20+floatOffset);
      ctx.beginPath();ctx.roundRect(-10,-5,20,45,5);
      ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.2;ctx.stroke();
      ctx.beginPath();ctx.arc(0,40,8,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;ctx.stroke();
      ctx.beginPath();ctx.roundRect(-8,48,16,35,4);
      ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.stroke();
      ctx.restore();
    }

    /* ── LEFT LEG ── */
    if(parts.lLeg.t>0){
      const t=easeOut(parts.lLeg.t);
      ctx.save();ctx.globalAlpha=t;ctx.translate(cx-20,cy+50+22*(1-t)+floatOffset);
      ctx.beginPath();ctx.roundRect(-12,0,24,50,5);
      ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.2;ctx.stroke();
      ctx.beginPath();ctx.roundRect(-14,50,28,18,4);
      ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;ctx.stroke();
      ctx.restore();
    }

    /* ── RIGHT LEG ── */
    if(parts.rLeg.t>0){
      const t=easeOut(parts.rLeg.t);
      ctx.save();ctx.globalAlpha=t;ctx.translate(cx+20,cy+50+22*(1-t)+floatOffset);
      ctx.beginPath();ctx.roundRect(-12,0,24,50,5);
      ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.2;ctx.stroke();
      ctx.beginPath();ctx.roundRect(-14,50,28,18,4);
      ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;ctx.stroke();
      ctx.restore();
    }

    /* ── CIRCUITS + SPARKS ── */
    drawCircuits();tickSparks();drawSparks();

    /* ── BODY SCAN after assembly ── */
    if(elapsed>2200){
      const sp=Math.min(1,(elapsed-2200)/1000);
      const sy=cy-120+240*sp;
      const sg=ctx.createLinearGradient(cx-80,sy-15,cx-80,sy+15);
      sg.addColorStop(0,'rgba(255,255,255,0)');
      sg.addColorStop(0.5,`rgba(255,255,255,${0.07*(1-sp)})`);
      sg.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=sg;ctx.fillRect(cx-80,sy-15,160,30);
    }

    /* ── REVEAL CARDS ── */
    if(elapsed>3200&&!revealed){
      revealed=true;
      if(statusText)statusText.textContent='AI Transformation Complete ✓';
      if(progressFill)progressFill.style.width='100%';
      if(progressLabel)progressLabel.textContent='100%';
      document.querySelectorAll('.hw-ai-card').forEach((card,i)=>{
        setTimeout(()=>card.classList.add('hw-revealed'),i*150);
      });
    }
  }

  /* ── MAIN LOOP ── */
  function loop(now){
    if(!loop.start)loop.start=now;
    const elapsed=now-loop.start;
    ctx.clearRect(0,0,W,H);
    /* bg grid */
    ctx.strokeStyle='rgba(255,255,255,0.025)';ctx.lineWidth=0.5;
    for(let x=0;x<W;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    drawRobot(elapsed);
    requestAnimationFrame(loop);
  }

  /* start on scroll into view */
  const section=document.getElementById('hwAiSection');
  if(!section){requestAnimationFrame(loop);return;}
  const obs=new IntersectionObserver(entries=>{
    if(entries[0].isIntersecting){obs.disconnect();requestAnimationFrame(loop);}
  },{threshold:0.2});
  obs.observe(section);
})();
</script>
