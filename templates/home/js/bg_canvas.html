<script>
(function(){
  const canvas=document.getElementById('bgCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  let W,H,nodes=[],mx=0,my=0;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',resize);
  window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});

  function Node(){this.reset();}
  Node.prototype.reset=function(){
    this.x=Math.random()*W;this.y=Math.random()*H;
    this.vx=(Math.random()-0.5)*0.6;this.vy=(Math.random()-0.5)*0.6;
    this.r=Math.random()*2.5+0.5;
    this.alpha=Math.random()*0.5+0.1;
    this.pulse=Math.random()*Math.PI*2;this.pulseV=Math.random()*0.025+0.008;
    this.shape=Math.floor(Math.random()*4);
    this.spin=Math.random()*Math.PI*2;this.spinV=(Math.random()-0.5)*0.02;
  };
  Node.prototype.update=function(){
    const dx=this.x-mx,dy=this.y-my,d=Math.sqrt(dx*dx+dy*dy)||1;
    if(d<150){this.vx+=(dx/d)*0.05;this.vy+=(dy/d)*0.05;}
    this.vx*=0.99;this.vy*=0.99;
    this.x+=this.vx;this.y+=this.vy;
    this.pulse+=this.pulseV;this.spin+=this.spinV;
    if(this.x<-10)this.x=W+10;if(this.x>W+10)this.x=-10;
    if(this.y<-10)this.y=H+10;if(this.y>H+10)this.y=-10;
  };
  Node.prototype.draw=function(){
    const a=this.alpha*(0.5+0.5*Math.sin(this.pulse)),r=this.r;
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.spin);ctx.globalAlpha=a;
    if(this.shape===0){
      const g=ctx.createRadialGradient(0,0,0,0,0,r*5);
      g.addColorStop(0,'rgba(255,255,255,0.2)');g.addColorStop(1,'rgba(255,255,255,0)');
      ctx.beginPath();ctx.arc(0,0,r*5,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
      ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();
    } else if(this.shape===1){
      ctx.beginPath();ctx.moveTo(0,-r*2.2);ctx.lineTo(r*1.2,0);ctx.lineTo(0,r*2.2);ctx.lineTo(-r*1.2,0);ctx.closePath();
      ctx.fillStyle='rgba(255,255,255,0.65)';ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.95)';
      ctx.beginPath();ctx.moveTo(0,-r*2.2);ctx.lineTo(r*0.5,-r*0.5);ctx.lineTo(0,0);ctx.lineTo(-r*0.5,-r*0.5);ctx.closePath();ctx.fill();
    } else if(this.shape===2){
      ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=0.8;
      for(let i=0;i<4;i++){ctx.save();ctx.rotate(i*Math.PI/4);ctx.beginPath();ctx.moveTo(0,-r*3);ctx.lineTo(0,r*3);ctx.stroke();ctx.restore();}
      ctx.beginPath();ctx.arc(0,0,r*0.7,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();
    } else {
      ctx.beginPath();
      for(let i=0;i<6;i++){const ang=(Math.PI/3)*i-Math.PI/6;i===0?ctx.moveTo(r*1.8*Math.cos(ang),r*1.8*Math.sin(ang)):ctx.lineTo(r*1.8*Math.cos(ang),r*1.8*Math.sin(ang));}
      ctx.closePath();ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=0.6;ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fill();
    }
    ctx.restore();
  };

  const COUNT=Math.min(140,Math.floor(window.innerWidth*window.innerHeight/10000));
  for(let i=0;i<COUNT;i++) nodes.push(new Node());

  let pulse=0;
  function drawLines(){
    pulse+=0.01;
    const DIST=150;
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<DIST){
          const base=(1-d/DIST)*0.14;
          ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);
          ctx.strokeStyle=`rgba(255,255,255,${base})`;ctx.lineWidth=0.5;ctx.stroke();
          if(d<100){
            const t=(pulse+i*0.1)%1;
            const px=nodes[i].x+(nodes[j].x-nodes[i].x)*t,py=nodes[i].y+(nodes[j].y-nodes[i].y)*t;
            ctx.beginPath();ctx.arc(px,py,1.5,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${base*2})`;ctx.fill();
          }
        }
      }
    }
  }

  const rings=Array.from({length:7},()=>({
    x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,
    r:Math.random()*100+30,vx:(Math.random()-0.5)*0.25,vy:(Math.random()-0.5)*0.25,
    alpha:Math.random()*0.07+0.02,pulse:Math.random()*Math.PI*2,pulseV:0.007,
    rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.003
  }));
  function drawRings(){
    rings.forEach(ring=>{
      ring.x+=ring.vx;ring.y+=ring.vy;ring.pulse+=ring.pulseV;ring.rot+=ring.rotV;
      if(ring.x<-ring.r)ring.x=W+ring.r;if(ring.x>W+ring.r)ring.x=-ring.r;
      if(ring.y<-ring.r)ring.y=H+ring.r;if(ring.y>H+ring.r)ring.y=-ring.r;
      const a=ring.alpha*(0.5+0.5*Math.sin(ring.pulse));
      ctx.save();ctx.translate(ring.x,ring.y);ctx.rotate(ring.rot);
      ctx.beginPath();ctx.ellipse(0,0,ring.r,ring.r*0.6,0,0,Math.PI*2);
      ctx.strokeStyle=`rgba(255,255,255,${a})`;ctx.lineWidth=0.8;ctx.stroke();
      ctx.beginPath();ctx.ellipse(0,0,ring.r*0.55,ring.r*0.33,0,0,Math.PI*2);
      ctx.strokeStyle=`rgba(255,255,255,${a*0.5})`;ctx.lineWidth=0.4;ctx.stroke();
      ctx.beginPath();ctx.ellipse(0,0,ring.r,ring.r*0.6,0,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${a*0.04})`;ctx.fill();
      ctx.restore();
    });
  }

  let scanY=0;
  function drawScan(){
    scanY=(scanY+0.7)%H;
    const g=ctx.createLinearGradient(0,scanY-50,0,scanY+50);
    g.addColorStop(0,'rgba(255,255,255,0)');g.addColorStop(0.5,'rgba(255,255,255,0.018)');g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=g;ctx.fillRect(0,scanY-50,W,100);
  }
  function drawFog(){
    const g=ctx.createLinearGradient(0,H*0.7,0,H);
    g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,0.4)');
    ctx.fillStyle=g;ctx.fillRect(0,H*0.7,W,H*0.3);
  }
  function loop(){
    ctx.clearRect(0,0,W,H);
    drawScan();drawRings();drawLines();
    nodes.forEach(n=>{n.update();n.draw();});
    drawFog();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
